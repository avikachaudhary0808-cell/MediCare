# Server Configuration
server.port=8081

# Gemini AI API Configuration
# Replace with your actual Gemini API Key to enable real AI symptom analysis
gemini.api.key=YOUR_GEMINI_API_KEY

# H2 Database Configuration (in-memory for development - no file lock issues)
spring.datasource.url=jdbc:h2:mem:medicare_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console for DB Inspection (at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
